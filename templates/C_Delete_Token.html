{% extends "Aprendiz_config.html" %}

{% block title %}SENA Attendance{% endblock %}

{% block content %}

<main class="container my-5">
    <div class="page-card card shadow-sm text-dark">
        <div class="card-header bg-danger text-white py-3">
            <h1 class="h5 mb-0">Eliminar Token</h1>
            <small class="text-light">{{ career }} · {{ token_value }}</small>
        </div>
        <div class="card-body p-4">
            <p class="lead">¿Estás seguro de que deseas eliminar este token?</p>
            <div class="mb-4">
                <strong>Carrera:</strong> {{ career }}<br>
                <strong>Token:</strong> {{ token_value }}
            </div>
            <form method="POST" action="{{ url_for('token.Delete_token', career=career, token_value=token_value) }}">
                <div class="d-flex gap-2 flex-wrap">
                    <button class="btn btn-danger" type="submit">Eliminar definitivamente</button>
                    <a class="btn btn-secondary" href="{{ url_for('token.module_token_config') }}">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>

{% endblock %}
