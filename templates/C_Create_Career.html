<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Carrera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/coordinador.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-sena px-3 navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center gap-2" href="#">
      <img src="https://www.sena.edu.co/Style%20Library/alayout/images/logoSena.png" width="34" height="34" alt="SENA">
      <span class="fw-bold">SENA Attendance</span>
    </a>
  </div>
</nav>

<main class="container my-5">
    <div class="page-card card shadow-sm" style="max-width: 600px; margin: 0 auto;">
        <div class="card-header bg-success text-white py-3">
            <h1 class="h5 mb-0">Crear Nueva Carrera</h1>
        </div>
        <div class="card-body p-4">
            <form method="POST" action="{{ url_for('career.Create_career') }}">
                <div class="mb-3">
                    <label for="career" class="form-label">Nombre de la Carrera</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="career" 
                        name="career"
                        placeholder="Ej: ADSO" 
                        required
                    >
                </div>

                {% if error %}
                    <div class="alert alert-danger" role="alert">
                        {{ error }}
                    </div>
                {% endif %}

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Crear Carrera</button>
                    <a href="{{ url_for('career.module_career_config') }}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
