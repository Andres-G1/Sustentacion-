{% extends "Aprendiz_config.html" %}

{% block title %}SENA Attendance{% endblock %}

{% block content %}

<main class="container my-5">
    <div class="page-card card shadow-sm" style="max-width: 600px; margin: 0 auto;">
        <div class="card-header bg-success text-white py-3">
            <h1 class="h5 mb-0">Crear Nueva Carrera</h1>
        </div>
        <div class="card-body p-4">
            <form method="POST" action="{{ url_for('career.Create_career') }}">
                <div class="mb-3">
                    <label for="career" class="form-label">Nombre de la Carrera</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="career" 
                        name="career"
                        placeholder="Ej: ADSO" 
                        required
                    >
                </div>

                {% if error %}
                    <div class="alert alert-danger" role="alert">
                        {{ error }}
                    </div>
                {% endif %}

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Crear Carrera</button>
                    <a href="{{ url_for('career.module_career_config') }}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>

{% endblock %}
