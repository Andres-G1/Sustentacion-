{% extends "Aprendiz_config.html" %}

{% block title %}Configuración de cuenta{% endblock %}

{% block content %}
<div class="config-container">
    <h2>Configuración de cuenta</h2>

    {% if mensaje %}
        <div class="alert alert-{{ tipo_mensaje }}">{{ mensaje }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('config.module_config') }}">

        <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" value="{{ user.name }} {{ user.lastname }}" disabled>
        </div>

        <div class="form-group">
            <label for="rol">Rol</label>
            <input type="text" id="rol" value="{{ user.role }}" disabled>
        </div>

        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input
                type="email"
                id="email"
                name="email"
                value="{{ user.email }}"
                placeholder="Deja igual si no quieres cambiarlo">
        </div>

        <div class="form-group">
            <label for="password">Nueva contraseña</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Deja vacío si no quieres cambiarla">
        </div>

        <hr>

        <div class="form-group">
            <label for="password_actual">Confirma tu contraseña actual</label>
            <input
                type="password"
                id="password_actual"
                name="password_actual"
                placeholder="Necesaria para guardar cualquier cambio"
                required>
        </div>

        <button type="submit" class="btn-guardar">Guardar cambios</button>
    </form>
</div>
{% endblock %}
