<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENA Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/coordinador.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-sena px-3 navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center gap-2" href="#">
      <img src="https://www.sena.edu.co/Style%20Library/alayout/images/logoSena.png" width="34" height="34" alt="SENA">
      <span class="fw-bold">SENA Attendance</span>
    </a>
  </div>
</nav>

<main class="container my-5">
    <div class="page-card card shadow-sm">
        <div class="card-header bg-warning text-dark py-3">
            <h1 class="h5 mb-0">Modificar Carrera</h1>
            <small class="text-muted">{{ career_name }}</small>
        </div>
        <div class="card-body p-4">
            <form action="{{ url_for('career.Alter_career', career_name=career_name) }}" method="POST">
                <div class="row g-3">
                    <div class="col-md-12">
                        <label for="career" class="form-label">Nombre de Carrera</label>
                        <input type="text" class="form-control" id="career" name="career" value="{{ career_name }}" placeholder="Ej: ADSO" required>
                    </div>
                </div>

                {% if error %}
                    <div class="alert alert-danger mt-3" role="alert">
                        {{ error }}
                    </div>
                {% endif %}

                <div class="form-actions mt-4">
                    <a href="{{ url_for('career.module_career_config') }}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
