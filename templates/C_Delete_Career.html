<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENA Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/coordinador.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-sena px-3 navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center gap-2" href="#">
      <img src="https://www.sena.edu.co/Style%20Library/alayout/images/logoSena.png" width="34" height="34" alt="SENA">
      <span class="fw-bold">SENA Attendance</span>
    </a>
  </div>
</nav>

<main class="container my-5">
    <div class="page-card card shadow-sm text-dark">
        <div class="card-header bg-danger text-white py-3">
            <h1 class="h5 mb-0">Eliminar Carrera</h1>
            <small class="text-light">{{ career_name }}</small>
        </div>
        <div class="card-body p-4">
            <p class="lead">¿Estás seguro de que deseas eliminar esta carrera?</p>
            <div class="mb-4">
                <strong>Carrera:</strong> {{ career_name }}<br>
                <span class="text-muted">Al eliminar esta carrera también se eliminarán todas las fichas asociadas.</span>
            </div>
            <form method="POST" action="{{ url_for('career.Delete_career', career_name=career_name) }}">
                <div class="d-flex gap-2 flex-wrap">
                    <button class="btn btn-danger" type="submit">Eliminar definitivamente</button>
                    <a class="btn btn-secondary" href="{{ url_for('career.module_career_config') }}">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
