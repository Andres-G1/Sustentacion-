{% extends "Aprendiz_config.html" %}

{% block title %}SENA Attendance{% endblock %}

{% block content %}

<main class="container my-5">
    <div class="page-card card shadow-sm">
        <div class="card-header bg-warning text-dark py-3">
            <h1 class="h5 mb-0">Modificar Token</h1>
            <small class="text-muted">{{ career }} · {{ old_token }}</small>
        </div>
        <div class="card-body p-4">
            <form action="{{ url_for('token.Alter_token', career=career, old_token=old_token) }}" method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="career" class="form-label">Carrera</label>
                        <input type="text" class="form-control" id="career" value="{{ career }}" disabled>
                    </div>
                    <div class="col-md-6">
                        <label for="old_token" class="form-label">Token Anterior</label>
                        <input type="text" class="form-control" id="old_token" value="{{ old_token }}" disabled>
                    </div>
                    <div class="col-md-12">
                        <label for="token" class="form-label">Nuevo Token</label>
                        <input type="text" class="form-control" id="token" name="token" value="{{ old_token }}" placeholder="Ej: 3407200" required>
                    </div>
                </div>

                {% if error %}
                    <div class="alert alert-danger mt-3" role="alert">
                        {{ error }}
                    </div>
                {% endif %}

                <div class="form-actions mt-4">
                    <a href="{{ url_for('token.module_token_config') }}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</main>

{% endblock %}
