{% extends "module_A.html" %}

{% block title %}SENA Attendance{% endblock %}

{% block content %}
<div class="config-card">
    <div class="card-header-custom">
        <div>
            <h2 class="page-title">Configuración de cuenta</h2>
            <p class="page-subtitle">Actualiza tus datos de acceso con seguridad y claridad.</p>
        </div>
        <span class="status-badge">{{ users.role }}</span>
    </div>

    {% if mensaje %}
        <div class="alert alert-{{ tipo_mensaje }}">{{ mensaje }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('config.module_config_aprendiz') }}" class="config-form">
        <div class="form-grid">
            <div class="form-group">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" value="{{ users.name }} {{ users.lastname }}" disabled>
            </div>

            <div class="form-group">
                <label for="rol">Rol</label>
                <input type="text" id="rol" value="{{ users.role }}" disabled>
            </div>

            <div class="form-group full-width">
                <label for="email">Correo electrónico</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    value="{{ users.email }}"
                    placeholder="Deja igual si no quieres cambiarlo">
            </div>

            <div class="form-group full-width">
                <label for="password">Nueva contraseña</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Deja vacío si no quieres cambiarla">
            </div>

            <div class="form-group full-width divider">
                <label for="password_actual">Confirma tu contraseña actual</label>
                <input
                    type="password"
                    id="password_actual"
                    name="password_actual"
                    placeholder="Necesaria para guardar cualquier cambio"
                    required>
            </div>
        </div>

        <div class="form-actions">
            <a href="/aprendiz/aprendiz" class="btn btn-outline-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success">Guardar cambios</button>
        </div>
    </form>
</div>
{% endblock %}
