{% extends "Aprendiz_config.html" %}

{% block title %}SENA Attendance{% endblock %}

{% block content %}

<main class="container my-5">
    <div class="page-card card shadow-sm" style="max-width: 600px; margin: 0 auto;">
        <div class="card-header bg-success text-white py-3">
            <h1 class="h5 mb-0">Crear Nuevo Token</h1>
        </div>
        <div class="card-body p-4">
            <form method="POST" action="{{ url_for('token.Create_token') }}">
                <div class="mb-3">
                    <label for="career" class="form-label">Selecciona una Carrera</label>
                    <select name="career" id="career" class="form-select" required>
                        <option value="" disabled selected>-- Selecciona una carrera --</option>
                        {% for c in career_avaliable %}
                            <option value="{{ c }}">{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="token" class="form-label">Número de Ficha</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="token" 
                        name="token"
                        placeholder="Ej: 3407200" 
                        required
                    >
                </div>

                {% if error %}
                    <div class="alert alert-danger" role="alert">
                        {{ error }}
                    </div>
                {% endif %}

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Crear Token</button>
                    <a href="{{ url_for('token.module_token_config') }}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>

{% endblock %}
