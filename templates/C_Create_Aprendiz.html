{% extends "Aprendiz_config.html" %}

{% block title %}SENA Attendance{% endblock %}

{% block content %}

<!-- Paso 1: elegir carrera (esto recarga la página) -->
<form method="GET">
    <label for="career">Carrera</label>
    <select name="career" id="career" class="form-select" onchange="this.form.submit()" required>
        <option value="" {% if not carrera_seleccionada %}selected disabled{% endif %}>Selecciona una carrera</option>
        {% for c in carreras %}
            <option value="{{ c }}" {% if c == carrera_seleccionada %}selected{% endif %}>{{ c }}</option>
        {% endfor %}
    </select>
</form>

<!-- Paso 2: solo aparece cuando ya hay carrera elegida -->
{% if carrera_seleccionada %}
<form method="POST">
    <input type="hidden" name="career" value="{{ carrera_seleccionada }}">

    <label>Tipo de documento</label>
    <select name="typeid" class="form-select">
        <option value="CC">CC</option>
        <option value="TI">TI</option>
        <option value="CE">CE</option>
        <option value="PEP">PEP</option>
        <option value="PPT">PPT</option>
    </select>

    <label>Número de documento</label>
    <input type="text" name="id" class="form-control" required>

    <label>Email</label>
    <input type="email" name="email" class="form-control" required>

    <label>Nombre</label>
    <input type="text" name="name" class="form-control" required>

    <label>Apellido</label>
    <input type="text" name="lastname" class="form-control" required>

    <label>Ficha</label>
    <select name="token" class="form-select" required>
        <option value="" selected disabled>Selecciona una ficha</option>
        {% for f in fichas %}
            <option value="{{ f }}">{{ f }}</option>
        {% endfor %}
    </select>

    {% if error %}<p class="text-danger">{{ error }}</p>{% endif %}

    <button type="submit" class="btn btn-primary">Registrar</button>
</form>
{% endif %}

{% endblock %}
