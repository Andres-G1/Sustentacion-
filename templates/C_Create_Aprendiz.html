{% extends "Aprendiz_config.html" %}

{% block title %}SENA Attendance{% endblock %}

{% block content %}

<main class="container my-5">
    <div class="page-card card shadow-sm" style="max-width: 700px; margin: 0 auto;">
        <div class="card-header bg-success text-white py-3">
            <h1 class="h5 mb-0">Crear Nuevo Aprendiz</h1>
        </div>
        <div class="card-body p-4">
            <!-- Paso 1: elegir carrera -->
            <form method="GET" class="mb-4">
                <div class="mb-3">
                    <label for="career" class="form-label">Selecciona una Carrera</label>
                    <select name="career" id="career" class="form-select" onchange="this.form.submit()" required>
                        <option value="" {% if not carrera_seleccionada %}selected disabled{% endif %}>-- Selecciona una carrera --</option>
                        {% for c in carreras %}
                            <option value="{{ c }}" {% if c == carrera_seleccionada %}selected{% endif %}>{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>
            </form>

            <!-- Paso 2: formulario completo cuando hay carrera elegida -->
            {% if carrera_seleccionada %}
                <form method="POST">
                    <input type="hidden" name="career" value="{{ carrera_seleccionada }}">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="typeid" class="form-label">Tipo de Documento</label>
                            <select name="typeid" id="typeid" class="form-select" required>
                                <option value="CC">Cédula de Ciudadanía (CC)</option>
                                <option value="TI">Tarjeta de Identidad (TI)</option>
                                <option value="CE">Cédula de Extranjería (CE)</option>
                                <option value="PEP">PEP</option>
                                <option value="PPT">PPT</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="id" class="form-label">Número de Documento</label>
                            <input type="text" class="form-control" id="id" name="id" required>
                        </div>
                        <div class="col-md-6">
                            <label for="name" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="col-md-6">
                            <label for="lastname" class="form-label">Apellido</label>
                            <input type="text" class="form-control" id="lastname" name="lastname" required>
                        </div>
                        <div class="col-md-12">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="col-md-12">
                            <label for="token" class="form-label">Ficha</label>
                            <select name="token" id="token" class="form-select" required>
                                <option value="" selected disabled>-- Selecciona una ficha --</option>
                                {% for f in fichas %}
                                    <option value="{{ f }}">{{ f }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    {% if error %}
                        <div class="alert alert-danger mt-3" role="alert">
                            {{ error }}
                        </div>
                    {% endif %}

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-success">Registrar Aprendiz</button>
                        <a href="{{ url_for('coordinador.module_aprendiz_config') }}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            {% endif %}
        </div>
    </div>
</main>

{% endblock %}
