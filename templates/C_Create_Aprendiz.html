<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} SENA Attendance {% endblock %} </title>
    <link rel="icon" href="https://www.sena.edu.co/Style%20Library/alayout/images/logoSena.png" type="image/png"> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/coordinador.css') }}">
    {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-sena px-3 navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center gap-2" href="#">
      <img src="https://www.sena.edu.co/Style%20Library/alayout/images/logoSena.png" width="34" height="34" alt="SENA">
      <span class="fw-bold">SENA Attendance</span>
    </a>
    
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navAprendiz">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navAprendiz">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-1">
        <li class="nav-item">
          <a class="nav-link active px-3 py-2" href="./coordinador">Inicio</a>
        </li>
        <li>
            <a class="nav-link active px-3 py-2" href="/coordinador/coordinador_create_A" >Gestionar usuarios</a>
        </li>
      </ul>

      <div class="dropdown">
          <div class="user-pill dropdown-toggle" id="dropdownUser" data-bs-toggle="dropdown" aria-expanded="false">
            <div class="text-end lh-sm">
              <div style="font-weight:600; color:white; font-size:0.88rem;"></div>
              <span class="badge-aprendiz"></span>
            </div>
            <div class="avatar"></div>
          </div>
          
          <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="dropdownUser">
            <li><a class="dropdown-menu-item dropdown-item" href="#perfil">Mi Perfil</a></li>
            <li><a class="dropdown-menu-item dropdown-item" href="#config">Configuración</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger fw-bold" href="/">Cerrar sesión</a></li>
          </ul>
      </div>
    </div>
  </div>
</nav>
<!-- Paso 1: elegir carrera (esto recarga la página) -->
<form method="GET">
    <label for="career">Carrera</label>
    <select name="career" id="career" class="form-select" onchange="this.form.submit()" required>
        <option value="" {% if not carrera_seleccionada %}selected disabled{% endif %}>Selecciona una carrera</option>
        {% for c in carreras %}
            <option value="{{ c }}" {% if c == carrera_seleccionada %}selected{% endif %}>{{ c }}</option>
        {% endfor %}
    </select>
</form>

<!-- Paso 2: solo aparece cuando ya hay carrera elegida -->
{% if carrera_seleccionada %}
<form method="POST">
    <input type="hidden" name="career" value="{{ carrera_seleccionada }}">

    <label>Tipo de documento</label>
    <select name="typeid" class="form-select">
        <option value="CC">CC</option>
        <option value="TI">TI</option>
        <option value="CE">CE</option>
        <option value="PEP">PEP</option>
        <option value="PPT">PPT</option>
    </select>

    <label>Número de documento</label>
    <input type="text" name="id" class="form-control" required>

    <label>Email</label>
    <input type="email" name="email" class="form-control" required>

    <label>Nombre</label>
    <input type="text" name="name" class="form-control" required>

    <label>Apellido</label>
    <input type="text" name="lastname" class="form-control" required>

    <label>Ficha</label>
    <select name="token" class="form-select" required>
        <option value="" selected disabled>Selecciona una ficha</option>
        {% for f in fichas %}
            <option value="{{ f }}">{{ f }}</option>
        {% endfor %}
    </select>

    {% if error %}<p class="text-danger">{{ error }}</p>{% endif %}

    <button type="submit" class="btn btn-primary">Registrar</button>
</form>
{% endif %}


</body>
</html>
